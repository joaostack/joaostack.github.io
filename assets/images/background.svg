<!-- Synthwave SVG background - cole dentro do <body> -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#12002b"/>
      <stop offset="45%" stop-color="#3b006b"/>
      <stop offset="100%" stop-color="#ff4da6"/>
    </linearGradient>

    <!-- Sun radial -->
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7c2" stop-opacity="1"/>
      <stop offset="20%" stop-color="#ffb86b" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ff4da6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6b00b8" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Neon glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern (horizontal lines drawn as thin rectangles for crispness) -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="skewX(-30)">
      <rect width="40" height="40" fill="transparent"/>
      <rect y="28" width="40" height="2" fill="#ff4da6" opacity="0.18"/>
      <rect y="20" width="40" height="1" fill="#fff" opacity="0.04"/>
    </pattern>

    <!-- Mountains gradients -->
    <linearGradient id="mtn1" x1="0" x2="1">
      <stop offset="0" stop-color="#ff4da6"/>
      <stop offset="1" stop-color="#6b00b8"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0" x2="1">
      <stop offset="0" stop-color="#ffb86b"/>
      <stop offset="1" stop-color="#3b006b"/>
    </linearGradient>

    <!-- small star symbol -->
    <circle id="star" r="1.5" fill="#fff"/>
  </defs>

  <!-- Background sky -->
  <rect width="100%" height="100%" fill="url(#sky)"/>

  <!-- Stars group (many small stars with subtle twinkle) -->
  <g id="stars" transform="translate(0,0)">
    <!-- Generate a handful of stars manually for aesthetics -->
    <use href="#star" x="120" y="80" opacity="0.9">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite" begin="0s"/>
    </use>
    <use href="#star" x="420" y="40" opacity="0.8">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="4.2s" repeatCount="indefinite" begin="0.3s"/>
    </use>
    <use href="#star" x="720" y="120" opacity="0.7">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite" begin="0.7s"/>
    </use>
    <use href="#star" x="1020" y="60" opacity="0.8">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="3.8s" repeatCount="indefinite" begin="0.2s"/>
    </use>
    <use href="#star" x="1500" y="90" opacity="0.85">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="4.6s" repeatCount="indefinite" begin="1s"/>
    </use>
    <use href="#star" x="1680" y="40" opacity="0.7">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="5.4s" repeatCount="indefinite" begin="0.5s"/>
    </use>
    <!-- more random small dots -->
    <g fill="#fff" opacity="0.65">
      <circle cx="300" cy="30" r="0.9">
        <animate attributeName="opacity" values="0.1;0.8;0.1" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="860" cy="20" r="0.7">
        <animate attributeName="opacity" values="0.05;0.9;0.05" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1340" cy="150" r="0.8">
        <animate attributeName="opacity" values="0.1;0.85;0.1" dur="5.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1780" cy="130" r="0.9">
        <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.9s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Sun (half-sunken) with scanline glow -->
  <g transform="translate(960,420)">
    <circle r="160" fill="url(#sunGrad)" filter="url(#glow)">
      <animate attributeName="r" values="155;165;155" dur="6s" repeatCount="indefinite"/>
    </circle>

    <!-- scanlines across sun -->
    <g opacity="0.12">
      <rect x="-200" y="-30" width="400" height="6" fill="#fff">
        <animateTransform attributeName="transform" type="translate" from="-10 -8" to="10 8" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="-200" y="-10" width="400" height="4" fill="#fff">
        <animateTransform attributeName="transform" type="translate" from="10 2" to="-10 -2" dur="3.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- horizon reflection -->
    <ellipse cx="0" cy="210" rx="420" ry="40" fill="url(#sunGrad)" opacity="0.08">
      <animate attributeName="opacity" values="0.06;0.12;0.06" dur="6s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Mountains (foreground and midground) -->
  <g transform="translate(0,260)">
    <!-- far mountains -->
    <path d="M0,560 L180,380 L360,460 L540,320 L720,480 L900,360 L1080,440 L1260,300 L1440,420 L1620,360 L1800,520 L1920,420 L1920,680 L0,680 Z"
          fill="url(#mtn2)" opacity="0.55" transform="translate(0,40)">
      <animateTransform attributeName="transform" type="translate" values="0,45;0,35;0,45" dur="10s" repeatCount="indefinite"/>
    </path>

    <!-- near mountains -->
    <path d="M0,680 L140,480 L320,560 L460,420 L640,600 L820,460 L1000,580 L1180,420 L1360,520 L1540,420 L1720,560 L1920,420 L1920,760 L0,760 Z"
          fill="url(#mtn1)" opacity="0.78" transform="translate(0,0)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Grid (perspective) - repeated rectangle filled with pattern, then clipped and animated -->
  <g transform="translate(0,420)">
    <rect x="-2000" y="0" width="5600" height="2200" fill="url(#gridPattern)" opacity="0.9" transform="skewX(-20) translate(0,0)">
      <!-- grid slide to create forward motion -->
      <animateTransform attributeName="transform"
                        type="translate"
                        values="0,0; -800,30; 0,0"
                        dur="9s" repeatCount="indefinite"/>
      <!-- slight vertical parallax -->
      <animate attributeName="y" values="0;8;0" dur="7s" repeatCount="indefinite"/>
    </rect>

    <!-- grid fade to horizon -->
    <rect x="0" y="0" width="100%" height="100%" fill="black" opacity="0">
      <animate attributeName="opacity" values="0;0.12;0" dur="12s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Foreground neon line for depth -->
  <g transform="translate(0,840)">
    <path d="M0,0 C240, -24 480,0 720, -12 C960,-26 1200, -4 1440,-18 C1680,-30 1920,-8 1920,0 L1920,80 L0,80 Z"
          fill="#000" opacity="0.06"/>
    <path d="M0,2 L1920,2" stroke="#ff4da6" stroke-width="2" opacity="0.12">
      <animate attributeName="stroke-opacity" values="0.06;0.22;0.06" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- subtle vignette for mood -->
  <rect width="100%" height="100%" fill="black" opacity="0.0">
    <animate attributeName="opacity" values="0;0.08;0" dur="14s" repeatCount="indefinite"/>
  </rect>
</svg>
